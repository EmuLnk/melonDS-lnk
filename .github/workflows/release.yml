name: Release

on:
  push:
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: zulu

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | tr -d '\n\r ' | base64 -d > /tmp/release.jks

      - name: Build & sign release APK
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "MELONDS_KEYSTORE=/tmp/release.jks" >> local.properties
          echo "MELONDS_KEYSTORE_PASSWORD=$KEY_STORE_PASSWORD" >> local.properties
          echo "MELONDS_KEY_ALIAS=$ALIAS" >> local.properties
          echo "MELONDS_KEY_PASSWORD=$KEY_PASSWORD" >> local.properties
          chmod +x ./gradlew
          ./gradlew :app:assembleGitHubProdRelease

      - name: Rename APK
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          APK=$(find app/build -name '*.apk' -path '*/gitHubProd/release/*' | head -1)
          mv "$APK" "melonds-lnk-${TAG_NAME}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: melonDS-LnK ${{ github.ref_name }}
          body: ""
          files: melonds-lnk-${{ github.ref_name }}.apk
          draft: true
          prerelease: false
